<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stem — Legal</title>
<style>
  :root { --bg:#0A0E1A; --card:#141929; --text:#E2E8F0; --muted:#94A3B8; --accent:#22C55E; --border:#1E293B; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.65; }
  .wrap { max-width:560px; margin:0 auto; padding:80px 24px; }
  .brand { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .brand .mark { width:44px; height:44px; border-radius:11px; background:linear-gradient(135deg,#16A34A,#22C55E); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:22px; }
  .brand h1 { font-size:26px; margin:0; }
  p.tag { color:var(--muted); margin:0 0 36px; }
  a.card { display:block; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 22px; margin-bottom:14px; text-decoration:none; color:var(--text); }
  a.card:hover { border-color:var(--accent); }
  a.card .h { font-size:17px; font-weight:600; color:#fff; }
  a.card .s { font-size:14px; color:var(--muted); margin-top:4px; }
  .foot { color:var(--muted); font-size:13px; margin-top:32px; }
  .foot a { color:var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="mark">S</div><h1>Stem</h1></div>
  <p class="tag">Connecting talent to growth.</p>
  <a class="card" href="./privacy.html"><div class="h">Privacy Policy</div><div class="s">What we collect, how we use it, and your choices.</div></a>
  <a class="card" href="./terms.html"><div class="h">Terms of Service</div><div class="s">The rules for using Stem.</div></a>
  <p class="foot">Contact: <a href="mailto:ip.sam23@gmail.com">ip.sam23@gmail.com</a></p>
</div>
</body>
</html>
